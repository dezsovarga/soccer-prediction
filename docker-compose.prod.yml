services:
  postgres:
    image: postgres:16-alpine
    container_name: soccer-prediction-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: soccer_prediction
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${IMAGE_PREFIX:-ghcr.io/placeholder}/backend:${IMAGE_TAG:-latest}
    build: ./backend
    container_name: soccer-prediction-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/soccer_prediction
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      FRONTEND_URL: ${FRONTEND_URL}
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
    expose:
      - "8080"

  frontend:
    image: ${IMAGE_PREFIX:-ghcr.io/placeholder}/frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: ${FRONTEND_URL}
    container_name: soccer-prediction-frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    container_name: soccer-prediction-caddy
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
